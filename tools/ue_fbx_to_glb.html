<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>UE FBX -&gt; GLB converter</title>
    <!--
      Build-time converter (NOT part of the game). Loads the UE Mannequin FBX (for its
      skeleton) + the A_Rifle animation FBX files with a MODERN three.js FBXLoader
      (r160, which parses these UE 2020 anim exports that r127 cannot), names the clips,
      and exports ONE small binary GLB carrying the SKELETON + clips (NO mesh geometry):
        assets/characters/ue/SK_Mannequin.glb  (skeleton + idle/aim/walk/jogs/jump/reload/shoot)
      The runtime loads it with its own (r127) GLTFLoader and uses ONLY its `.animations`
      — the rendered body comes from the pre-oriented SK_Mannequin_new.glb, and the clips
      drive that rig by bone name. So this GLB needs no mesh; exporting skeleton-only keeps
      it tiny and avoids the TGA-material export error. Run via tools/convert_ue.mjs.
      The clips stay in native UE space (Z-up, cm); adaptClipToPreOriented does the
      Y-up/metre fix at runtime (PlayerBody/soldier), exactly like every other clip.
    -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'three';
      import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
      import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

      const status = { steps: [] };
      const log = (m) => { status.steps.push(m); document.title = m; };

      try {
        const loader = new FBXLoader();
        const base = '../assets/characters/ue/';

        // Load the mannequin FBX only to harvest its SKELETON — the clips drive the
        // game's own rig (the pre-oriented SK_Mannequin_new.glb) by bone name, so the
        // runtime never uses this GLB's mesh, only its `.animations`. We therefore
        // export just the bone hierarchy (see below), which keeps the GLB tiny and
        // sidesteps the TGA-material export error entirely (no mesh = no materials).
        log('loading mesh');
        const mesh = await loader.loadAsync(base + 'SK_Mannequin.FBX');
        mesh.name = 'SK_Mannequin';

        const animFiles = {
          idle: 'A_Rifle_Idle.fbx',           // updated rifle idle (was A_Rifle_Idle_.FBX)
          aim: 'A_Rifle_Aim.fbx',             // down-the-sights aim pose (drives the torso while ADS)
          walk: 'A_Rifle_Jog_Fwd.FBX',        // forward jog (name 'walk' kept for soldier back-compat)
          jog_bwd: 'A_Rifle_Jog_Bwd.fbx',     // strafe/directional locomotion (player anim graph)
          jog_left: 'A_Rifle_Jog_Left.fbx',
          jog_right: 'A_Rifle_Jog_Right.fbx',
          jump_start: 'A_Rifle_Jump_Start.fbx',     // one-shot launch -> transitions to jump_fall
          jump_fall: 'A_Rifle_Jump_Fall_Loop.fbx',  // looping airborne / fall
          reload: 'A_Rifle_Reload_new.fbx',   // updated reload (paired with the AK mag-drop clip; same 2.2333s length)
          shoot: 'A_Rifle_Fire.FBX',
        };

        const clips = [];
        for (const [name, file] of Object.entries(animFiles)) {
          log('loading anim ' + name);
          const fbx = await loader.loadAsync(base + file);
          const clip = fbx.animations[0];
          clip.name = name; // rename "Unreal Take" -> idle/walk/reload/shoot
          clips.push(clip);
        }

        // Export only the bone hierarchy (NOT the skinned-mesh geometry) so the GLB
        // stays small (~hundreds of KB, clips-only) — the runtime pulls just the clips
        // and drives the pre-oriented rig by bone name. Find the topmost bone (its
        // parent is not a bone) and export that subtree; every clip's tracks target a
        // bone in it, so the animations export intact. (Mirrors roll_to_glb.html.)
        let topBone = null;
        mesh.traverse((o) => { if (o.isBone && !topBone && !(o.parent && o.parent.isBone)) topBone = o; });
        const exportRoot = topBone || mesh;
        exportRoot.animations = clips;

        log('exporting glb');
        const exporter = new GLTFExporter();
        const glb = await new Promise((resolve, reject) => {
          exporter.parse(
            exportRoot,
            (result) => resolve(result),
            (err) => reject(err),
            { binary: true, animations: clips, includeCustomExtensions: true }
          );
        });

        // ArrayBuffer -> base64 for transfer back to Node.
        const bytes = new Uint8Array(glb);
        let bin = '';
        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        window.__GLB_B64 = btoa(bin);
        status.bytes = bytes.length;
        status.clips = clips.map((c) => ({ name: c.name, dur: +c.duration.toFixed(3), tracks: c.tracks.length }));
        status.ok = true;
        log('done');
      } catch (e) {
        status.ok = false;
        status.error = (e.message || String(e)) + '\n' + (e.stack || '');
        log('error');
      }
      window.__STATUS = status;
    </script>
  </body>
</html>
